name: Precompiled NIFs

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/precompiled-nifs.yml"
      - "lib/mneme/native.ex"
      - "native/mneme_nif.zig"
      - "mix.exs"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_nifs:
    name: NIF - ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # target = full Zig triple (arch-os-abi). macOS uses abi "none" — that is not a missing version.
        include:
          - { target: aarch64-macos-none, os: macos-14 }
          - { target: x86_64-macos-none, os: macos-14 }
          - { target: aarch64-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-linux-gnu, os: ubuntu-22.04 }

    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      ZIG_VERSION: "0.15.2"
      MNEME_BUILD: "1"
      # ZiglerPrecompiled: .../download/<tag> + "/" + "Elixir.Mneme.Native-v<MIX_VER>-<triple>.so.tar.gz" (tag must be v<MIX_VER>).
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-nif-${{ matrix.target }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-nif-${{ matrix.target }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^[[:space:]]*version: \"\\(.*\\)\".*/\\1/p' mix.exs | head -n1)" >> "$GITHUB_ENV"

      - name: Download Zig
        run: mix zig.get

      - name: Compile NIF from source
        env:
          MIX_ENV: dev
        run: mix compile --warnings-as-errors

      - name: Package artifact
        shell: bash
        run: |
          v="${PROJECT_VERSION}"
          test -n "$v" || { echo "::error::no PROJECT_VERSION from mix.exs"; exit 1; }
          if [[ "${GITHUB_REF}" == refs/tags/* && "v${v}" != "${GITHUB_REF_NAME}" ]]; then
            echo "::error::tag must be v${v} (mix.exs), got ${GITHUB_REF_NAME}"
            exit 1
          fi

          BASENAME="Elixir.Mneme.Native"
          NIF_DIR="_build/dev/lib/mneme/priv/lib"
          NIF_FILE="${NIF_DIR}/${BASENAME}.so"

          if [ ! -f "$NIF_FILE" ]; then
            echo "::error::NIF file not found: $NIF_FILE"
            find _build -maxdepth 8 -type f -name "Elixir.Mneme.Native*.so" || true
            exit 1
          fi

          ARTIFACT="${BASENAME}-v${v}-${{ matrix.target }}.so.tar.gz"
          tar czf "${ARTIFACT}" -C "$NIF_DIR" .
          echo "Packaged ${ARTIFACT}"
          echo "Zigler download URL: ${MNEME_NIF_BASE_URL}/${ARTIFACT}"

      - name: Verify tarball matches zigler_precompiled basename
        env:
          TRIPLE: ${{ matrix.target }}
        run: |
          mix run --no-start -e '
            v = Mix.Project.config()[:version]
            triple = System.fetch_env!("TRIPLE")
            want = ZiglerPrecompiled.lib_name_with_ext(
              triple,
              ZiglerPrecompiled.lib_name("Elixir.Mneme.Native", v, triple)
            )
            unless File.exists?(want), do: raise("expected #{want} (zigler download basename)")
          '

      - name: Artifact attestation
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "*.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mneme-native-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    name: Create release
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    name: Publish to Hex.pm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      MNEME_BUILD: "1"
      # Same base as `use ZiglerPrecompiled` / zigler_precompiled.download (path + filename both carry v<MIX_VER>).
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: mix deps.get

      - name: Download Zig
        run: mix zig.get

      - name: Compile NIF from source
        env:
          MIX_ENV: dev
        run: mix compile --warnings-as-errors

      - name: Generate checksum file from GitHub Release
        run: mix zigler_precompiled.download Mneme.Native --all --print

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}