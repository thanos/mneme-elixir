name: Precompiled NIFs

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/precompiled-nifs.yml"
      - "lib/mneme/native.ex"
      - "native/mneme_nif.zig"
      - "mix.exs"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_nifs:
    name: NIF - ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-macos-none, os: macos-14 }
          - { target: x86_64-macos-none, os: macos-14 }
          - { target: aarch64-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-linux-musl, os: ubuntu-22.04 }
          - { target: x86_64-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-linux-musl, os: ubuntu-22.04 }

    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      ZIG_VERSION: "0.15.2"
      MNEME_BUILD: "1"
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-nif-${{ matrix.target }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-nif-${{ matrix.target }}-

      - run: mix deps.get

      - name: Project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^[[:space:]]*version: \"\\(.*\\)\".*/\\1/p' mix.exs | head -n1)" >> "$GITHUB_ENV"

      - run: mix zig.get

      - name: Cross-compile target
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            aarch64-linux-gnu)
              echo "TARGET_ARCH=aarch64" >> "$GITHUB_ENV"
              echo "TARGET_OS=linux" >> "$GITHUB_ENV"
              echo "TARGET_ABI=gnu" >> "$GITHUB_ENV"
              ;;
            aarch64-linux-musl)
              echo "TARGET_ARCH=aarch64" >> "$GITHUB_ENV"
              echo "TARGET_OS=linux" >> "$GITHUB_ENV"
              echo "TARGET_ABI=musl" >> "$GITHUB_ENV"
              ;;
            x86_64-linux-gnu)
              echo "TARGET_ARCH=x86_64" >> "$GITHUB_ENV"
              echo "TARGET_OS=linux" >> "$GITHUB_ENV"
              echo "TARGET_ABI=gnu" >> "$GITHUB_ENV"
              ;;
            x86_64-linux-musl)
              echo "TARGET_ARCH=x86_64" >> "$GITHUB_ENV"
              echo "TARGET_OS=linux" >> "$GITHUB_ENV"
              echo "TARGET_ABI=musl" >> "$GITHUB_ENV"
              ;;
            aarch64-macos-none)
              echo "TARGET_ARCH=aarch64" >> "$GITHUB_ENV"
              echo "TARGET_OS=darwin" >> "$GITHUB_ENV"
              echo "TARGET_ABI=none" >> "$GITHUB_ENV"
              ;;
            x86_64-macos-none)
              echo "TARGET_ARCH=x86_64" >> "$GITHUB_ENV"
              echo "TARGET_OS=darwin" >> "$GITHUB_ENV"
              echo "TARGET_ABI=none" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unknown target ${{ matrix.target }}"
              exit 1
              ;;
          esac

      - run: mix compile --warnings-as-errors
        env:
          MIX_ENV: dev

      - name: Package
        shell: bash
        run: |
          v="${PROJECT_VERSION}"
          test -n "$v" || { echo "::error::no PROJECT_VERSION"; exit 1; }
          if [[ "${GITHUB_REF}" == refs/tags/* && "v${v}" != "${GITHUB_REF_NAME}" ]]; then
            echo "::error::tag must be v${v} (mix.exs), got ${GITHUB_REF_NAME}"
            exit 1
          fi
          b="Elixir.Mneme.Native"
          dir="_build/dev/lib/mneme/priv/lib"
          test -f "${dir}/${b}.so" || { echo "::error::missing ${dir}/${b}.so"; exit 1; }
          mkdir -p artifacts
          out="artifacts/${b}-v${v}-${{ matrix.target }}.so.tar.gz"
          tar czf "$out" -C "$dir" .
          ls -la artifacts/

      - name: Attest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: artifacts/*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: Elixir.Mneme.Native-v${{ env.PROJECT_VERSION }}-${{ matrix.target }}
          path: artifacts/*.tar.gz

  release:
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Collect assets
        run: |
          mkdir -p nifs
          find release-artifacts -name '*.tar.gz' -exec cp {} nifs/ \;
          (cd nifs && sha256sum *.tar.gz > checksums.txt)
          ls -la nifs/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            nifs/*.tar.gz
            nifs/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      MNEME_BUILD: "1"
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - run: mix deps.get

      - run: mix zig.get

      - run: mix compile --warnings-as-errors
        env:
          MIX_ENV: dev

      - run: mix zigler_precompiled.download Mneme.Native --all --print

      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
