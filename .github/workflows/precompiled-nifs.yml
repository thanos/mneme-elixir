name: Precompiled NIFs

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/precompiled-nifs.yml"
      - "lib/mneme/native.ex"
      - "native/mneme_nif.zig"
      - "mix.exs"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_nifs:
    name: NIF - ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # target = Zig triple (arch-os-abi). "none" is the normal macOS ABI in Zig.
        include:
          - { target: aarch64-macos-none,  os: macos-14      }
          - { target: x86_64-macos-none,   os: macos-14      }
          - { target: aarch64-linux-gnu,   os: ubuntu-22.04  }
          - { target: x86_64-linux-gnu,    os: ubuntu-22.04  }

    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      MNEME_BUILD: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: deps/_build
          key: ${{ runner.os }}-nif-${{ matrix.target }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-nif-${{ matrix.target }}-

      - run: mix deps.get

      # Zig must be present before any step that compiles native.ex (including mix run).
      - run: mix zig.get

      - name: Extract version
        run: |
          v=$(awk -F'"' '/^[[:space:]]*version:/{print $2; exit}' mix.exs)
          test -n "$v" || { echo "::error::could not parse version from mix.exs"; exit 1; }
          echo "MIX_VERSION=$v" >> "$GITHUB_ENV"

      - name: Compile
        env:
          MIX_ENV: dev
        run: mix compile --warnings-as-errors

      - name: Package
        shell: bash
        run: |
          v="${MIX_VERSION}"
          if [[ "${GITHUB_REF}" == refs/tags/* && "v${v}" != "${GITHUB_REF_NAME}" ]]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match mix.exs version v${v}"
            exit 1
          fi

          BASENAME="Elixir.Mneme.Native"
          NIF_DIR="_build/dev/lib/mnemedb_client/priv/lib"

          test -f "${NIF_DIR}/${BASENAME}.so" || {
            echo "::error::NIF not found at ${NIF_DIR}/${BASENAME}.so"
            find _build -name "Elixir.Mneme.Native*.so" 2>/dev/null || true
            exit 1
          }

          # ZiglerPrecompiled download URL = base_url "/" "${BASENAME}-v${v}-${triple}.so.tar.gz"
          ARTIFACT="${BASENAME}-v${v}-${{ matrix.target }}.so.tar.gz"
          tar czf "${ARTIFACT}" -C "${NIF_DIR}" .
          echo "artifact: ${ARTIFACT}"

      - name: Attest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "*.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: Elixir.Mneme.Native-${{ matrix.target }}
          path: "*.tar.gz"
          if-no-files-found: error

  release:
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
          merge-multiple: true

      - name: Collect
        run: |
          mkdir -p nifs
          find dl -name '*.tar.gz' -exec cp {} nifs/ \;
          (cd nifs && sha256sum *.tar.gz > checksums.txt)
          ls -la nifs/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            nifs/*.tar.gz
            nifs/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      MNEME_BUILD: "1"
      # ZiglerPrecompiled: base_url + "/" + "Elixir.Mneme.Native-v<ver>-<triple>.so.tar.gz"
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - run: mix deps.get
      - run: mix zig.get

      - run: mix compile --warnings-as-errors
        env:
          MIX_ENV: dev

      - run: mix zigler_precompiled.download Mneme.Native --all --print

      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
