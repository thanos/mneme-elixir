name: Precompiled NIFs

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/precompiled-nifs.yml"
      - "lib/mneme/native.ex"
      - "native/mneme_nif.zig"
      - "mix.exs"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_nifs:
    name: NIF - ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-macos-none, os: macos-14, zig_arch: aarch64-macos }
          - { target: x86_64-macos-none, os: macos-14, zig_arch: aarch64-macos }
          - { target: aarch64-linux-gnu, os: ubuntu-22.04, zig_arch: x86_64-linux }
          - { target: x86_64-linux-gnu, os: ubuntu-22.04, zig_arch: x86_64-linux }

    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      ZIG_VERSION: "0.15.2"
      MNEME_BUILD: "1"
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-nif-${{ matrix.target }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-nif-${{ matrix.target }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^[[:space:]]*version: \"\\(.*\\)\".*/\\1/p' mix.exs | head -n1)" >> "$GITHUB_ENV"

      - name: Download Zig
        run: mix zig.get

      - name: Compile NIF from source
        env:
          MIX_ENV: dev
        run: mix compile --warnings-as-errors

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${PROJECT_VERSION}"
          BASENAME="Elixir.Mneme.Native"
          NIF_DIR="_build/dev/lib/mneme/priv/lib"
          NIF_FILE="${NIF_DIR}/${BASENAME}.so"

          if [ ! -f "$NIF_FILE" ]; then
            echo "::error::NIF file not found: $NIF_FILE"
            find _build -maxdepth 8 -type f -name "Elixir.Mneme.Native*.so" || true
            exit 1
          fi

          tar czf "${BASENAME}-v${VERSION}-${{ matrix.target }}.so.tar.gz" -C "$NIF_DIR" .

      - name: Artifact attestation
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "*.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mneme-native-v${{ env.PROJECT_VERSION }}-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    name: Create release
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    name: Publish to Hex.pm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      ELIXIR_VERSION: "1.18.3"
      OTP_VERSION: "27.2"
      MNEME_BUILD: "1"
      MNEME_NIF_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: mix deps.get

      - name: Download Zig
        run: mix zig.get

      - name: Compile NIF from source
        run: mix compile --warnings-as-errors

      - name: Generate checksum file from GitHub Release
        run: mix zigler_precompiled.download Mneme.Native --all --print 2>/dev/null

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
